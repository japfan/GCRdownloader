<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GCR Materi Downloader</title>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
  <link rel="stylesheet" href="popup.css">
</head>

<body class="bg-gray-50 w-96 font-sans text-gray-800">
  <!-- Header -->
  <header class="bg-blue-600 text-white p-4 shadow-md flex justify-between items-center">
    <div class="flex items-center gap-3">
      <img src="icons/logo.png" alt="Logo" class="w-8 h-8 rounded flex-shrink-0">
      <div>
        <h1 class="text-lg font-bold">GCR Downloader</h1>
        <p class="text-xs text-blue-200">Unduh materi kelas massal</p>
      </div>
    </div>
    <div class="flex items-center gap-2">
      <button id="btn-theme" title="Toggle dark/light mode" class="text-lg">🌙</button>
      <div id="status-badge" class="hidden text-xs bg-yellow-400 text-yellow-900 px-2 py-1 rounded font-semibold">
        Loading...
      </div>
    </div>
  </header>

  <!-- Main Content -->
  <main class="p-4">
    <!-- Initial State -->
    <div id="initial-state" class="text-center py-6">
      <p class="text-sm text-gray-500 mb-4">
        Buka tab <b>Materi Kelas</b> (Classwork) di Google Classroom, atau halaman <b>course SPADA</b>, lalu klik Scan.
      </p>
      <button id="btn-scan"
        class="bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2 px-6 rounded shadow transition-colors">
        Scan Materi
      </button>
    </div>

    <!-- Error State -->
    <div id="error-state" class="hidden py-4">
      <div class="text-red-500 mb-2 text-center">
        <svg class="w-10 h-10 mx-auto" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
        </svg>
      </div>
      <div id="error-message" class="text-sm text-gray-600 mb-4 max-h-64 overflow-y-auto whitespace-pre-wrap break-words bg-gray-100 rounded p-2"></div>
      <div class="text-center">
        <button id="btn-back" class="text-blue-600 text-sm hover:underline">Kembali</button>
      </div>
    </div>

    <!-- Results State -->
    <div id="results-state" class="hidden flex flex-col h-[350px]">
      <div class="flex justify-between items-center mb-3">
        <h2 class="font-semibold text-gray-700 text-sm" id="file-count">0 File Terdeteksi</h2>
        <label class="flex items-center text-sm text-gray-600 cursor-pointer">
          <input type="checkbox" id="checkbox-all" class="mr-2 rounded text-blue-600 focus:ring-blue-500" checked>
          Pilih Semua
        </label>
      </div>

      <!-- File List -->
      <div class="flex-1 overflow-y-auto border border-gray-200 rounded bg-white shadow-inner mb-3 p-2" id="file-list">
        <!-- List items will be appended here -->
      </div>

      <!-- Action Footer -->
      <div class="border-t border-gray-200 pt-3">
        <div id="progress-container" class="hidden mb-3">
          <div class="flex justify-between text-xs text-gray-500 mb-1">
            <span id="progress-text">Mengunduh... (0/0)</span>
            <span id="progress-percent">0%</span>
          </div>
          <div class="w-full bg-gray-200 rounded-full h-2">
            <div id="progress-bar" class="bg-blue-600 h-2 rounded-full transition-all duration-300" style="width: 0%">
            </div>
          </div>
        </div>

        <button id="btn-download"
          class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-2 px-4 rounded shadow transition-colors flex items-center justify-center">
          <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path>
          </svg>
          Download Terpilih
        </button>
      </div>
    </div>
  </main>

  <script src="popup.js"></script>
</body>

</html>
